<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <radialGradient id="wMoonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.18"/>
      <stop offset="70%"  stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wGroundGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="wGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Divider lines -->
  <line x1="0"   y1="80" x2="330" y2="80" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2"/>
  <line x1="570" y1="80" x2="900" y2="80" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- Moon behind wolf -->
  <circle cx="450" cy="40" r="28" fill="url(#wMoonGlow)" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.2">
    <animate attributeName="r" values="28;34;28" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="40" r="22" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Ground glow -->
  <ellipse cx="450" cy="135" rx="90" ry="12" fill="url(#wGroundGlow)">
    <animate attributeName="rx" values="90;110;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Wolf silhouette -->
  <g filter="url(#wGlow)">
    <!-- pulse breath -->
    <animateTransform attributeName="transform" type="scale" values="1,1; 1.012,1.012; 1,1" dur="4s" additive="sum" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="450,80; 444.6,79.1; 450,80" dur="4s" additive="sum" repeatCount="indefinite"/>

    <!-- BODY -->
    <ellipse cx="450" cy="108" rx="46" ry="22" fill="none" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.8"/>
    <!-- fur texture lines on back -->
    <path d="M418,88 Q430,82 442,86 Q454,80 466,84 Q478,78 488,82" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.35"/>
    <path d="M420,94 Q432,88 444,92 Q456,86 468,90 Q480,84 490,88" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.28"/>

    <!-- TAIL (raised up) -->
    <path d="M496,108 Q522,95 534,78 Q540,65 530,60 Q524,58 520,65 Q516,72 522,78" fill="none" stroke="#D4AF37" stroke-width="2.2" stroke-opacity="0.72" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- tail fur -->
    <path d="M534,78 Q542,70 536,62" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.4"/>
    <path d="M530,60 Q525,52 518,56" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.35"/>

    <!-- BACK LEGS -->
    <path d="M422,126 Q418,136 415,148" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-opacity="0.65" stroke-linecap="round"/>
    <path d="M415,148 L408,155 M415,148 L416,156 M415,148 L422,154" fill="none" stroke="#D4AF37" stroke-width="1.4" stroke-opacity="0.55"/>
    <!-- knee joint -->
    <circle cx="418" cy="136" r="2.5" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>

    <path d="M464,126 Q462,136 460,148" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-opacity="0.65" stroke-linecap="round"/>
    <path d="M460,148 L453,155 M460,148 L461,157 M460,148 L467,154" fill="none" stroke="#D4AF37" stroke-width="1.4" stroke-opacity="0.55"/>
    <circle cx="462" cy="136" r="2.5" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>

    <!-- NECK (extended upward, howling) -->
    <path d="M424,90 Q428,72 436,55 Q440,44 444,34" fill="none" stroke="#D4AF37" stroke-width="12" stroke-opacity="0.08" stroke-linecap="round"/>
    <path d="M424,90 Q428,72 436,55 Q440,44 444,34" fill="none" stroke="#D4AF37" stroke-width="2.4" stroke-opacity="0.8" stroke-linecap="round"/>
    <!-- throat -->
    <path d="M436,88 Q432,70 437,52" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.35"/>

    <!-- HEAD (tilted upward howling) -->
    <ellipse cx="446" cy="28" rx="16" ry="13" transform="rotate(-15,446,28)" fill="#0d1117" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.9"/>
    <!-- muzzle (open for howl) -->
    <path d="M432,32 Q436,38 444,37 Q450,36 452,30" fill="#0d1117" stroke="#D4AF37" stroke-width="1.4" stroke-opacity="0.8"/>
    <!-- upper muzzle line -->
    <path d="M432,30 Q436,26 444,28 Q450,30 452,28" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.7"/>
    <!-- nose -->
    <path d="M430,28 Q432,25 434,28 Q432,30 430,28 Z" fill="#D4AF37" fill-opacity="0.6"/>
    <!-- ear 1 -->
    <path d="M450,18 L456,4  L462,17" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.85" stroke-linejoin="round"/>
    <!-- ear 2 -->
    <path d="M440,16 L444,4  L450,16" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.7"  stroke-linejoin="round"/>
    <!-- eye (looking up) -->
    <ellipse cx="447" cy="24" rx="4" ry="3.5" fill="#0d1117" stroke="#D4AF37" stroke-width="1"/>
    <ellipse cx="448" cy="24" rx="2.5" ry="3" fill="#D4AF37" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- fur on forehead -->
    <path d="M436,16 Q444,10 452,14" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3"/>
  </g>

  <!-- HOWL BREATH RINGS -->
  <circle cx="424" cy="12" r="5" fill="none" stroke="#D4AF37" stroke-width="1.2">
    <animate attributeName="r"             values="5;18;5"   dur="2.4s" begin="0s"    repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.7;0;0.7" dur="2.4s" begin="0s"    repeatCount="indefinite"/>
  </circle>
  <circle cx="424" cy="12" r="5" fill="none" stroke="#D4AF37" stroke-width="0.9">
    <animate attributeName="r"             values="5;22;5"   dur="2.4s" begin="0.6s"  repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="2.4s" begin="0.6s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="424" cy="12" r="5" fill="none" stroke="#D4AF37" stroke-width="0.7">
    <animate attributeName="r"             values="5;28;5"   dur="2.4s" begin="1.2s"  repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0;0.3" dur="2.4s" begin="1.2s"  repeatCount="indefinite"/>
  </circle>

  <!-- Inscription -->
  <text x="450" y="154" text-anchor="middle" fill="#D4AF37" font-size="10" font-family="monospace" opacity="0.4" letter-spacing="5">🐺  LONE WITNESS TO ALL THAT IS BUILT  🐺</text>
</svg>
