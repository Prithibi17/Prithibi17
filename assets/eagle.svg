<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="eWingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="50%"  stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="eBodyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <line x1="0" y1="80" x2="900" y2="80" id="divLine"/>
    <clipPath id="eClip"><rect width="900" height="160"/></clipPath>
  </defs>

  <!-- Divider lines -->
  <line x1="0" y1="80" x2="330" y2="80" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2"/>
  <line x1="570" y1="80" x2="900" y2="80" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- Body glow -->
  <ellipse cx="450" cy="82" rx="50" ry="22" fill="url(#eBodyGlow)">
    <animate attributeName="rx" values="50;60;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Eagle main group — subtle drift -->
  <g filter="url(#eGlow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="4s" repeatCount="indefinite"/>

    <!-- === LEFT WING === -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0,440,82; -25,440,82; 0,440,82" dur="3s" calcMode="spline" keySplines="0.4,0,0.6,1; 0.4,0,0.6,1" repeatCount="indefinite"/>
      <!-- main membrane -->
      <path d="M440,82 Q370,42 240,25 Q280,62 350,82 Q390,85 440,82 Z" fill="url(#eWingGrad)" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.8"/>
      <!-- primary feathers fanned out -->
      <path d="M440,82 Q390,55 320,30" fill="none" stroke="#D4AF37" stroke-width="1.4" stroke-opacity="0.7"/>
      <path d="M440,82 Q385,48 305,36" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.6"/>
      <path d="M440,82 Q382,52 290,45" fill="none" stroke="#D4AF37" stroke-width="1"  stroke-opacity="0.55"/>
      <path d="M440,82 Q380,58 278,58" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.45"/>
      <path d="M440,82 Q378,65 268,70" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.4"/>
      <path d="M440,82 Q375,70 262,80" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.35"/>
      <!-- feather tips -->
      <circle cx="240" cy="25" r="4" fill="#D4AF37" opacity="0.6"/>
      <circle cx="268" cy="70" r="3" fill="#D4AF37" opacity="0.4"/>
      <circle cx="262" cy="80" r="2.5" fill="#D4AF37" opacity="0.35"/>
      <!-- covert feathers (secondary) -->
      <path d="M440,82 Q400,70 360,78" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,4"/>
    </g>

    <!-- === RIGHT WING === -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0,460,82; 25,460,82; 0,460,82" dur="3s" calcMode="spline" keySplines="0.4,0,0.6,1; 0.4,0,0.6,1" repeatCount="indefinite"/>
      <!-- main membrane -->
      <path d="M460,82 Q530,42 660,25 Q620,62 550,82 Q510,85 460,82 Z" fill="url(#eWingGrad)" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.8"/>
      <!-- primary feathers -->
      <path d="M460,82 Q510,55 580,30" fill="none" stroke="#D4AF37" stroke-width="1.4" stroke-opacity="0.7"/>
      <path d="M460,82 Q515,48 595,36" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.6"/>
      <path d="M460,82 Q518,52 610,45" fill="none" stroke="#D4AF37" stroke-width="1"  stroke-opacity="0.55"/>
      <path d="M460,82 Q520,58 622,58" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.45"/>
      <path d="M460,82 Q522,65 632,70" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.4"/>
      <path d="M460,82 Q525,70 638,80" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.35"/>
      <!-- feather tips -->
      <circle cx="660" cy="25" r="4" fill="#D4AF37" opacity="0.6"/>
      <circle cx="632" cy="70" r="3" fill="#D4AF37" opacity="0.4"/>
      <circle cx="638" cy="80" r="2.5" fill="#D4AF37" opacity="0.35"/>
    </g>

    <!-- === BODY === -->
    <ellipse cx="450" cy="88" rx="24" ry="14" fill="#0d1117" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.85"/>
    <!-- feather detail on body -->
    <path d="M432,84 Q450,80 468,84" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.4"/>
    <path d="M428,90 Q450,86 472,90" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3"/>

    <!-- === HEAD === -->
    <circle cx="450" cy="68" r="14" fill="#0d1117" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.9"/>
    <!-- white head marking -->
    <path d="M438,62 Q450,56 462,62" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="2,2"/>
    <!-- === BEAK === -->
    <path d="M462,70 L475,73 L462,76 Z" fill="#D4AF37" fill-opacity="0.7" stroke="#D4AF37" stroke-width="0.8"/>
    <!-- curved beak upper -->
    <path d="M462,70 Q470,68 474,72" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.8"/>
    <!-- === EYE === -->
    <circle cx="457" cy="66" r="5" fill="#0d1117" stroke="#D4AF37" stroke-width="1.2"/>
    <circle cx="458" cy="66" r="3" fill="#D4AF37" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9;0.9" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="456" cy="64" r="1.2" fill="white" opacity="0.5"/>
    <!-- brow -->
    <path d="M452,61 Q457,58 463,61" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.8"/>

    <!-- === TALONS === -->
    <path d="M440,102 Q436,112 433,122" fill="none" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
    <path d="M433,122 L427,130 M433,122 L432,132 M433,122 L438,130 M433,122 L440,128" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.55"/>
    <path d="M460,102 Q464,112 467,122" fill="none" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
    <path d="M467,122 L461,130 M467,122 L466,132 M467,122 L471,130 M467,122 L474,128" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.55"/>
  </g>

  <!-- Inscription -->
  <text x="450" y="152" text-anchor="middle" fill="#D4AF37" font-size="10" font-family="monospace" opacity="0.4" letter-spacing="5">🦅  WATCHER OF THE ENERGY FLOW  🦅</text>
</svg>
