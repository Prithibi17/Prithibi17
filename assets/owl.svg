<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="900" height="150">
  <defs>
    <radialGradient id="oEyeL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="oEyeR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="oAura" cx="50%" cy="60%" r="50%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="oGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="oEyeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Divider lines -->
  <line x1="0"   y1="75" x2="355" y2="75" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2"/>
  <line x1="545" y1="75" x2="900" y2="75" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- Aura under owl -->
  <ellipse cx="450" cy="110" rx="70" ry="15" fill="url(#oAura)">
    <animate attributeName="rx" values="70;85;70" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Perch branch -->
  <rect x="355" y="118" width="190" height="5" rx="2.5" fill="#D4AF37" opacity="0.2"/>
  <path d="M355,118 Q450,112 545,118" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.3"/>
  <!-- branch texture -->
  <path d="M380,119 L375,128 M410,119 L407,130 M440,119 L439,131" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Owl body — very slight breath expansion -->
  <g filter="url(#oGlow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="4s" repeatCount="indefinite"/>

    <!-- body -->
    <ellipse cx="450" cy="95" rx="38" ry="28" fill="#0d1117" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.85"/>
    <!-- chest feather layers -->
    <path d="M420,88 Q435,82 450,88 Q465,82 480,88" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.35"/>
    <path d="M415,95 Q432,88 450,95 Q468,88 485,95" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.3"/>
    <path d="M418,103 Q434,96 450,103 Q466,96 482,103" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.25"/>
    <path d="M422,110 Q436,104 450,110 Q464,104 478,110" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.2"/>

    <!-- wings folded -->
    <path d="M413,88 Q400,95 408,112 Q420,118 430,110" fill="none" stroke="#D4AF37" stroke-width="1.3" stroke-opacity="0.55"/>
    <path d="M487,88 Q500,95 492,112 Q480,118 470,110" fill="none" stroke="#D4AF37" stroke-width="1.3" stroke-opacity="0.55"/>
    <!-- wing feathers -->
    <path d="M410,95 Q402,100 406,108" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="2,3"/>
    <path d="M490,95 Q498,100 494,108" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="2,3"/>

    <!-- head (slight rotate) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0,450,67; 4,450,67; 0,450,67; -4,450,67; 0,450,67" dur="8s" repeatCount="indefinite"/>
      <!-- head circle -->
      <circle cx="450" cy="67" r="22" fill="#0d1117" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.9"/>
      <!-- facial disc -->
      <path d="M428,67 Q450,48 472,67 Q450,86 428,67 Z" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3"/>
      <!-- ear tufts -->
      <path d="M436,46 L430,32 L440,40" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.8"/>
      <path d="M464,46 L470,32 L460,40" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.8"/>
      <!-- feather texture on head -->
      <path d="M438,50 Q450,44 462,50" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.3"/>

      <!-- LEFT EYE -->
      <circle cx="440" cy="67" r="8" fill="#0d1117" stroke="#D4AF37" stroke-width="1.4" filter="url(#oEyeGlow)"/>
      <ellipse cx="440" cy="67" rx="6" ry="6" fill="url(#oEyeL)">
        <!-- blink -->
        <animate attributeName="ry" values="6;0.3;6;6;6;6;6" dur="5s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="437" cy="64" r="2" fill="#0d1117"/>
      <circle cx="436" cy="63" r="1" fill="white" opacity="0.6"/>
      <!-- eye ring -->
      <circle cx="440" cy="67" r="8" fill="none" stroke="#D4AF37" stroke-width="0.7" stroke-opacity="0.5"/>

      <!-- RIGHT EYE -->
      <circle cx="460" cy="67" r="8" fill="#0d1117" stroke="#D4AF37" stroke-width="1.4" filter="url(#oEyeGlow)"/>
      <ellipse cx="460" cy="67" rx="6" ry="6" fill="url(#oEyeR)">
        <!-- blink (slightly offset) -->
        <animate attributeName="ry" values="6;0.3;6;6;6;6;6" dur="5s" begin="0.08s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="463" cy="64" r="2" fill="#0d1117"/>
      <circle cx="464" cy="63" r="1" fill="white" opacity="0.6"/>
      <circle cx="460" cy="67" r="8" fill="none" stroke="#D4AF37" stroke-width="0.7" stroke-opacity="0.5"/>

      <!-- beak -->
      <path d="M447,74 L450,81 L453,74 Z" fill="#D4AF37" fill-opacity="0.65" stroke="#D4AF37" stroke-width="0.8"/>
    </g>

    <!-- TALONS gripping branch -->
    <path d="M432,119 L425,127 M432,119 L430,129 M432,119 L436,128 M432,119 L440,126" fill="none" stroke="#D4AF37" stroke-width="1.3" stroke-opacity="0.55"/>
    <path d="M468,119 L461,127 M468,119 L467,129 M468,119 L472,128 M468,119 L476,126" fill="none" stroke="#D4AF37" stroke-width="1.3" stroke-opacity="0.55"/>
    <path d="M432,118 L432,122 M468,118 L468,122" fill="none" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- Inscription -->
  <text x="450" y="145" text-anchor="middle" fill="#D4AF37" font-size="10" font-family="monospace" opacity="0.4" letter-spacing="5">🦉  KEEPER OF FORGOTTEN LOGS  🦉</text>
</svg>
