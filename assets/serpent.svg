<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80">
  <defs>
    <linearGradient id="sBodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="12%" stop-color="#D4AF37" stop-opacity="0.9"/>
      <stop offset="88%" stop-color="#D4AF37" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sShadowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914" stop-opacity="0"/>
      <stop offset="12%" stop-color="#8B6914" stop-opacity="0.5"/>
      <stop offset="88%" stop-color="#8B6914" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0"/>
    </linearGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sShadow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="sClip"><rect width="1200" height="80"/></clipPath>
  </defs>

  <g clip-path="url(#sClip)">
    <!-- Shadow layer -->
    <g filter="url(#sShadow)" opacity="0.4">
      <animateTransform attributeName="transform" type="translate" from="0,4" to="-600,4" dur="9s" repeatCount="indefinite"/>
      <path d="M-600,40 Q-525,12 -450,40 Q-375,68 -300,40 Q-225,12 -150,40 Q-75,68 0,40 Q75,12 150,40 Q225,68 300,40 Q375,12 450,40 Q525,68 600,40 Q675,12 750,40 Q825,68 900,40 Q975,12 1050,40 Q1125,68 1200,40 Q1275,12 1350,40 Q1425,68 1500,40 Q1575,12 1650,40 Q1725,68 1800,40"
            fill="none" stroke="url(#sShadowGrad)" stroke-width="9" stroke-linecap="round"/>
    </g>

    <!-- Main serpent body -->
    <g filter="url(#sGlow)">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-600,0" dur="9s" repeatCount="indefinite"/>
      <path d="M-600,40 Q-525,12 -450,40 Q-375,68 -300,40 Q-225,12 -150,40 Q-75,68 0,40 Q75,12 150,40 Q225,68 300,40 Q375,12 450,40 Q525,68 600,40 Q675,12 750,40 Q825,68 900,40 Q975,12 1050,40 Q1125,68 1200,40 Q1275,12 1350,40 Q1425,68 1500,40 Q1575,12 1650,40 Q1725,68 1800,40"
            fill="none" stroke="url(#sBodyGrad)" stroke-width="4.5" stroke-linecap="round"/>
      <!-- Scale dots at wave peaks -->
      <circle cx="-450" cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="-300" cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="-150" cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="0"    cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="150"  cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="300"  cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="450"  cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="600"  cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="750"  cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="900"  cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
      <circle cx="1050" cy="40" r="3.5" fill="#D4AF37" opacity="0.6"/>
    </g>

    <!-- Serpent head (fixed) -->
    <g transform="translate(68,40)">
      <!-- head base -->
      <ellipse cx="0" cy="0" rx="18" ry="10" fill="#1a1208" stroke="#D4AF37" stroke-width="1.6" opacity="0.92"/>
      <!-- top scale ridge -->
      <path d="M-10,-10 Q0,-16 10,-10" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.7"/>
      <path d="M-6,-5 Q0,-9 6,-5" fill="none" stroke="#D4AF37" stroke-width="0.9" opacity="0.5"/>
      <!-- snout taper -->
      <path d="M14,-4 Q22,0 14,4" fill="#1a1208" stroke="#D4AF37" stroke-width="1.2" opacity="0.85"/>
      <!-- nostril -->
      <circle cx="20" cy="-2" r="1.2" fill="#D4AF37" opacity="0.6"/>
      <!-- eye -->
      <ellipse cx="7" cy="-3" rx="5" ry="4" fill="#0d1117" stroke="#D4AF37" stroke-width="1.2"/>
      <ellipse cx="8" cy="-3" rx="2" ry="3" fill="#D4AF37" opacity="0.9">
        <animate attributeName="ry" values="3;0.3;3;3;3" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="9" cy="-4" r="0.8" fill="white" opacity="0.5"/>
      <!-- forked tongue -->
      <g>
        <animate attributeName="opacity" values="1;0;0;1;1" dur="2s" repeatCount="indefinite"/>
        <path d="M23,0 L32,0" stroke="#D4AF37" stroke-width="1.3" fill="none"/>
        <path d="M32,0 L36,-4" stroke="#D4AF37" stroke-width="1.1" fill="none"/>
        <path d="M32,0 L36,4"  stroke="#D4AF37" stroke-width="1.1" fill="none"/>
      </g>
    </g>

    <!-- Rune text below -->
    <text x="600" y="72" text-anchor="middle" fill="#D4AF37" font-size="10" font-family="monospace" opacity="0.45" letter-spacing="5">🐍  ANCIENT SERPENT OF THE CODE RIVERS  🐍</text>
  </g>
</svg>
